
bernoulli_simple:
  entrypoint: "parametric:BernoulliBandit"
  kwargs:
    means: [0.2, 0.8, 0.7, 0.5]

bernoulli_hard:
  entrypoint: "parametric:BernoulliBandit"
  kwargs:
    means: [ 0.7, 0.7, 0.701, 0.7 ]

binomial_simple:
  entrypoint: "parametric:BinomialBandit"
  kwargs:
    means: [0.2, 0.8, 0.7, 0.5]
    repetitions: 200

gaussian_simple:
  entrypoint: "parametric:GaussianBandit"
  kwargs:
    means: [0.2, 0.8, 0.7, 0.5]
    vars: [0.05, 0.05, 0.05, 0.05]

truncated_gaussian:
  entrypoint: "parametric:TruncatedGaussianBandit"
  kwargs:
    means: [0.2, 0.8, 0.7, 0.5]

bernoulli_random:
  entrypoint: "parametric:RandomBernoulliBandit"
  kwargs:
    Delta: 0.2
    K: 5