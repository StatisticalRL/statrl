  kwargs:
    means: [0.2, 0.8, 0.7, 0.5]

bernoulli_hard:
  entrypoint: "statrl.settings.bandits.stochastic.anytime.envs.parametric.BernoulliBandit"
  kwargs:
    means: [ 0.7, 0.7, 0.701, 0.7 ]

binomial_simple:
