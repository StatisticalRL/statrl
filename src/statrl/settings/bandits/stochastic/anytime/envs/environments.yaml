    means: [0.2, 0.8, 0.7, 0.5]
    vars: [0.05, 0.05, 0.05, 0.05]

truncated_gaussian:
  entrypoint: "statrl.settings.bandits.stochastic.anytime.envs.parametric.TruncatedGaussianBandit"
